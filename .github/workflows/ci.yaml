name: Run Tests on Push to Main
permissions: {}
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test

  # The jsonnet implementation (jsonnet/) must stay behaviourally identical to
  # the TypeScript source of truth (src/). The contract is the conformance
  # corpus in spec/fixtures/, generated from the jest suite: this job fails if
  # the committed corpus drifts from TypeScript behaviour, or if the jsonnet
  # implementation diverges from the corpus.
  jsonnet-conformance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate conformance fixtures from the jest suite
        run: pnpm run generate:fixtures

      - name: Fail if committed fixtures drifted from TypeScript behaviour
        run: git diff --exit-code -- spec/fixtures

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Install go-jsonnet
        run: go install github.com/google/go-jsonnet/cmd/jsonnet@v0.22.0 github.com/google/go-jsonnet/cmd/jsonnetfmt@v0.22.0

      - name: Check jsonnet formatting
        run: |
          jsonnetfmt --test jsonnet/promql.libsonnet jsonnet/test/*.jsonnet jsonnet/test/*.libsonnet

      - name: Replay conformance corpus against the jsonnet implementation
        run: ./scripts/test-jsonnet.sh
